<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
  <!-- Learn: GraduationCap -->
  <symbol id="icon-learn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21.21 15.89A10 10 0 1 0 3.6 8.989"/>
    <path d="M22.4 3v5h-5"/>
  </symbol>

  <!-- Compete: Trophy -->
  <symbol id="icon-compete" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 9H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-2"/>
    <path d="M12 14v8"/>
    <path d="M19 9v-3a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v3"/>
  </symbol>

  <!-- Club: Building2 -->
  <symbol id="icon-club" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21v-4a6 6 0 0 1 6-6h6a6 6 0 0 1 6 6v4"/>
    <path d="M9 21h6"/>
    <path d="M9 5h6"/>
    <path d="M9 9h6"/>
  </symbol>

  <!-- Events: CalendarDays -->
  <symbol id="icon-events" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
    <path d="M16 2v4"/>
    <path d="M8 2v4"/>
    <path d="M3 10h18"/>
  </symbol>

  <!-- Members: Key -->
  <symbol id="icon-members" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 2l-9 4m0 0L5 2m16 0v6m0 0l4 2m-4-2v-2"/>
    <circle cx="11" cy="13" r="1"/>
  </symbol>

  <!-- Join: UserPlus -->
  <symbol id="icon-join" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <circle cx="8.5" cy="7" r="4"/>
    <path d="M20 8v6"/>
    <path d="M23 11h-6"/>
  </symbol>

  <!-- Hamburger Menu -->
  <symbol id="icon-hamburger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 6h16M4 12h16M4 18h16"/>
  </symbol>

  <!-- Close X -->
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 6L6 18M6 6l12 12"/>
  </symbol>

  <!-- ChevronDown (for menu toggle) -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"></polyline>
  </symbol>

  <!-- ArrowRight (for club news link) -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14"/>
    <path d="M12 5l7 7-7 7"/>
  </symbol>

  <!-- Newspaper (for club news icon) -->
  <symbol id="icon-newspaper" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 11h16V7a2 2 0 00-2-2H6a2 2 0 00-2 2v4z"/>
    <path d="M4 15a2 2 0 012 2v4a2 2 0 01-2 2h0V15z"/>
    <path d="M6 15h12v6H6z"/>
